name: Shithub CI/CD

on:
  push:
    branches:
      - main

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Backend smoke compile
        run: python -m compileall backend cli

      - name: Backend and CLI tests
        run: PYTHONPATH=. pytest tests/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Frontend build
        run: npm run build --prefix frontend

      - name: Frontend tests
        run: npm run test --prefix frontend

  continuous-deployment:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render API deploy hook
        env:
          HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_API_DEPLOY_HOOK is not set; skipping API deploy trigger."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"

      - name: Trigger Render frontend deploy hook
        env:
          HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK is not set; skipping frontend deploy trigger."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
